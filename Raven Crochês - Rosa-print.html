<!DOCTYPE html>
<html lang="pt-BR" data-theme="rosa">
<head>
  <meta charset="UTF-8" />
  <title>Raven Crochês · amigurumis com alma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=DM+Sans:wght@300;400;500;600;700&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ===== PRINT-FRIENDLY OVERRIDES (apply on screen too for stable preview) ===== */
    html, body {
      cursor: auto !important;
      overflow: visible !important;
    }
    /* Hide custom cursor */
    .cursor-hook, .cursor-trail { display: none !important; }
    /* Force fade-in elements visible */
    [data-fade] { opacity: 1 !important; transform: none !important; }
    /* Make header static (not sticky) for print */
    .mm-header {
      position: static !important;
      background: var(--bg) !important;
      backdrop-filter: none !important;
      border-bottom: 1px solid var(--ink) !important;
    }
    /* Disable animations */
    *, *::before, *::after {
      animation-duration: 0s !important;
      animation-delay: 0s !important;
      transition: none !important;
    }
    /* Keep all hover effects in default state */
    .creature-card { transform: none !important; }
    /* Hide scroll-hint indicator */
    .scroll-hint { display: none !important; }
    /* Hide vibe-toggle text on print but keep icons */
    .vibe-toggle { display: none !important; }
    /* Hide footer marquee animation; keep static */
    .footer-band span { animation: none !important; }
    .footer-band { white-space: normal !important; }
    .footer-band span:nth-child(n+3) { display: none !important; }

    @page {
      size: A4 portrait;
      margin: 12mm 10mm;
    }

    @media print {
      :root { -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
      html, body { background: var(--bg) !important; }
      body::before { display: none !important; } /* grain texture off for print */

      .mm-header { display: none !important; }

      .hero {
        padding: 20px 24px 30px !important;
        min-height: auto !important;
        break-after: page;
      }
      .hero-inner { margin-top: 0 !important; gap: 30px !important; grid-template-columns: 1.1fr 1fr !important; }
      .display-title { font-size: 96px !important; }
      .hero-feature { width: 360px !important; height: 360px !important; }
      .feature-bg { width: 260px !important; height: 260px !important; }
      .hero-feature svg { width: 240px !important; height: 240px !important; }

      .corner-ornament { display: none !important; }

      section {
        padding: 30px 24px !important;
        break-inside: avoid-page;
      }
      .sobre { break-after: page; }
      .galeria { break-after: page; }
      .processo { margin: 0 !important; padding: 30px 24px !important; break-after: page; }
      .depoimentos { break-after: page; }
      .contato { margin: 0 !important; padding: 50px 24px !important; }

      .section-head { margin-bottom: 24px !important; }
      .section-title { font-size: 56px !important; }
      .section-deck { font-size: 20px !important; }

      .sobre-grid { grid-template-columns: 0.85fr 1fr !important; gap: 30px !important; }
      .photo-placeholder { aspect-ratio: 4/5 !important; }

      .creatures-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 14px !important; }
      .creature-card { padding: 14px 10px 14px !important; break-inside: avoid; }
      .card-art { height: 150px !important; }
      .card-art svg { width: 140px !important; height: 140px !important; }
      .card-art::before { width: 120px !important; height: 120px !important; }
      .card-name { font-size: 22px !important; }
      .card-note { font-size: 13px !important; min-height: 18px !important; }
      .card-cta { display: none !important; }

      .process-steps { grid-template-columns: repeat(4, 1fr) !important; }
      .step { padding: 14px 12px !important; break-inside: avoid; }
      .step-num { width: 60px !important; height: 60px !important; font-size: 22px !important; }
      .step-title { font-size: 24px !important; }
      .step-text { font-size: 12px !important; }
      .step-thread { display: none !important; }

      .testimonials-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 18px !important; }
      .testimonial { padding: 22px 18px 14px !important; break-inside: avoid; transform: none !important; margin: 0 !important; }
      .quote-mark { font-size: 60px !important; }
      .testimonial blockquote { font-size: 13px !important; }
      .tape-yellow { display: none !important; }

      .contato-title { font-size: 88px !important; }
      .contato-sub { font-size: 14px !important; margin: 18px auto 28px !important; }
      .contato-buttons { grid-template-columns: 1fr 1fr !important; gap: 16px !important; }
      .big-btn { padding: 18px 18px !important; }

      .mm-footer { break-before: avoid; }
      .footer-band { padding: 8px 0 !important; font-size: 14px !important; }
      .footer-inner { padding: 20px 24px !important; }

      /* Modal/easter overlays not relevant in print */
      .modal-backdrop, .egg-overlay { display: none !important; }

      /* Disable feature-poke button click target */
      .feature-poke { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>window.__THEME = 'rosa';</script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="js/data.js"></script>
  <script type="text/babel" src="js/cursor.jsx"></script>
  <script type="text/babel" src="js/creatures.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>

  <script type="text/babel">
    // Auto-print after fonts + React mount + a safety delay
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
      } catch (e) {}
      // Wait for app to mount
      const waitForApp = () => new Promise(resolve => {
        const check = () => {
          if (document.querySelector('.mm-app') && document.querySelectorAll('.creature-card').length >= 8) {
            resolve();
          } else {
            setTimeout(check, 100);
          }
        };
        check();
      });
      await waitForApp();
      // Extra safety delay for layout + SVG render
      await new Promise(r => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
